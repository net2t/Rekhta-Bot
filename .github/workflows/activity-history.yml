name: Inbox Mails - Activity History

"on":
  workflow_dispatch:
    inputs:
      dry_run:
        description: "--dry-run"
        type: boolean
        required: true
        default: false
      headless:
        description: "Headless browser"
        type: boolean
        required: true
        default: true
      debug:
        description: "Debug logging"
        type: boolean
        required: true
        default: false
  schedule:
    - cron: "*/20 * * * *"

jobs:
  run:
    uses: ./.github/workflows/dashboard.yml
    with:
      mode: activity
      max_profiles: ""
      dry_run: ${{ github.event.inputs.dry_run == true }}
      populate_img_links: false
      populate_limit: ""
      populate_write: false
      headless: ${{ github.event.inputs.headless != false }}
      debug: ${{ github.event.inputs.debug == true }}
    secrets: inherit
