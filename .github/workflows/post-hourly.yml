name: 📝 Post Mode

on:
  schedule:
    # Run every hour at minute 5 (PKT timezone - UTC+5)
    - cron: '5 * * * *'
  workflow_dispatch: # Allow manual triggering
    inputs:
      quantity:
        description: 'Number of posts to create'
        required: true
        default: '1'
        type: choice
        options:
        - '1'
        - '2'
        - '3'
        - '5'
        - '10'

jobs:
  hourly-posting:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: 🔧 Set up environment
      env:
        DD_LOGIN_EMAIL: ${{ secrets.DD_LOGIN_EMAIL }}
        DD_LOGIN_PASS: ${{ secrets.DD_LOGIN_PASS }}
        DD_SHEET_ID: ${{ secrets.DD_SHEET_ID }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      run: |
        echo "DD_LOGIN_EMAIL=$DD_LOGIN_EMAIL" >> .env
        echo "DD_LOGIN_PASS=$DD_LOGIN_PASS" >> .env
        echo "DD_SHEET_ID=$DD_SHEET_ID" >> .env
        echo "GOOGLE_CREDENTIALS_JSON=$GOOGLE_CREDENTIALS_JSON" >> .env
        echo "DD_DEBUG=0" >> .env
        echo "DD_HEADLESS=1" >> .env
        echo "DD_DISABLE_IMAGES=1" >> .env
        
    - name: 📝 Run Post Mode
      env:
        DD_LOGIN_EMAIL: ${{ secrets.DD_LOGIN_EMAIL }}
        DD_LOGIN_PASS: ${{ secrets.DD_LOGIN_PASS }}
        DD_SHEET_ID: ${{ secrets.DD_SHEET_ID }}
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      run: |
        python main.py post --max ${{ github.event.inputs.quantity || '1' }} --headless
        
    - name: 📊 Upload logs if any exist
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: post-logs-${{ github.run_number }}
        path: logs/
        retention-days: 3
