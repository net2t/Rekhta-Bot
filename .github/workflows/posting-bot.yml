name: Posting Bot

"on":
  workflow_dispatch:
    inputs:
      max_items:
        description: "Max posts to create (empty = all)"
        type: string
        required: false
        default: ""
      debug:
        description: "Debug logging"
        type: boolean
        required: true
        default: false
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run:
    uses: ./.github/workflows/dashboard.yml
    with:
      mode: post
      max_items: ${{ github.event.inputs.max_items || '' }}
      headless: true
      debug: ${{ github.event.inputs.debug == 'true' }}
    secrets: inherit
