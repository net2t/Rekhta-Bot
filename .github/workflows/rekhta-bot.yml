name: Rekhta Bot

"on":
  workflow_dispatch:
    inputs:
      max_items:
        description: "Max new items to add (empty = all new)"
        type: string
        required: false
        default: ""
      debug:
        description: "Debug logging"
        type: boolean
        required: true
        default: false

jobs:
  run:
    uses: ./.github/workflows/dashboard.yml
    with:
      mode: rekhta
      max_items: ${{ github.event.inputs.max_items || '' }}
      headless: true
      debug: ${{ github.event.inputs.debug == 'true' }}
    secrets: inherit
